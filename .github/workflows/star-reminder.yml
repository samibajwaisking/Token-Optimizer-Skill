name: Star Check Notice

on:
  issues:
    types: [opened]
  pull_request:
    types: [opened]

jobs:
  remind-to-star:
    runs-on: ubuntu-latest
    steps:
      - name: Post star reminder
        uses: actions/github-script@v7
        with:
          script: |
            const isIssue = context.eventName === 'issues';
            const number = isIssue
              ? context.payload.issue.number
              : context.payload.pull_request.number;
            const actor = isIssue
              ? context.payload.issue.user.login
              : context.payload.pull_request.user.login;

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: number,
              body: `👋 Hi @${actor}! Thanks for contributing.\n\n⭐ **Reminder:** This repo uses a Star-Required License. Please [star the repository](https://github.com/${context.repo.owner}/${context.repo.repo}) before using or distributing this skill.\n\nSee [LICENSE](https://github.com/${context.repo.owner}/${context.repo.repo}/blob/main/LICENSE) for full terms.\n\n— *Token Optimizer Skill by [Sami Bajwa](https://samioutic.com)*`
            });
